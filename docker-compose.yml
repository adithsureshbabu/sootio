version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sootio
    container_name: sootio
    ports:
      - "55771:55771"
    volumes:
      - sootio-data:/app/data  # Persist SQLite cache data
    networks:
      - sootio-network
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=error
      - MAX_WORKERS=8
      - POSTGRES_POOL_SIZE=10
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 24G
    restart: always

volumes:
  sootio-data:  # Named volume for persistent data

networks:
  sootio-network:
    driver: bridge
    name: sootio-network
